policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement agg-to-rip {
        term 1 {
            from {
                protocol aggregate;
                route-filter 0.0.0.0/0 exact;
            }
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement filter-rip {
        term 1 {
            from {
                protocol rip;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement isis-to-ospf3 {
        term 1 {
            from protocol isis;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement ospf3-filter {
        term 1 {
            from {
                protocol ospf3;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement ospf3-to-isis {
        term 1 {
            from protocol ospf3;
            then accept;
        }
    }
    policy-statement ospf3-to-rip {
        term 1 {
            from protocol ospf3;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rip-to-isis {
        term 1 {
            from protocol rip;
            then accept;
        }
    }
    policy-statement rip-to-ospf3 {
        term 1 {
            from protocol rip;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54000:64512;
