policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement IX-export {
        term 1 {
            from {
                protocol bgp;
                community P1;
            }
            then reject;
        }
        term 2 {
            from {
                protocol aggregate;
                route-filter 172.16.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement IX-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                community set IX;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement ldp-routes {
        term 1 {
            from {
                route-filter 192.168.1.0/24 exact;
                route-filter 172.16.0.2/32 exact;
            }
            then accept;
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54000:64512;
    community C2 members 54000:64513;
    community C3 members 54000:64514;
    community IX members 54000:1620;
    community P1 members 54000:1679;
    community P2 members 54000:53732;
    community P3 members 54000:43208;
    community rtbh members 6451.:666;
}
firewall {
    family vpls {
        filter vpls_bum_filter {
            term 1 {
                from {
                    traffic-type [ broadcast multicast ];
                }
                then policer vpls_policer;
            }
        }
    }
    policer vpls_policer {
        if-exceeding {
            bandwidth-limit 1m;
            burst-size-limit 64k;
        }
        then discard;
    }
}
