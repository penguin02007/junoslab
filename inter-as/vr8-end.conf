policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement P1-export {
        term 1 {
            from {
                protocol bgp;
                community IX;
            }
            then reject;
        }
        term 2 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/17 exact;
            }
            then {
                community set no-export;
                accept;
            }
        }
        term 3 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement P1-filter {
        term 1 {
            from {
                as-path P1;
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 210;
                community set P1;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement lsp-map {
        term 1 {
            from {
                protocol bgp;
                community P2;
            }
            then {
                install-nexthop lsp R8-to-R3-1;
            }
        }
        term 2 {
            from {
                protocol bgp;
                community P3;
            }
            then {
                install-nexthop lsp R8-to-R3-2;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54591:64512;
