            import [ default-filter C3-filter ];
            family inet {
                unicast;
            }
            family inet6 {
                unicast;
            }
            export as-internal;
            peer-as 64600;
            multipath;
            neighbor 192.168.0.82 {
                export ipv6-next-hop-1;
            }
        }
        group ibgp {
            type internal;
            local-address 172.16.0.5;
            import rtbh;
            family inet {
                unicast;
