policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement P2-export {
        term 1 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement P2-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 200;
                community set P2;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement P3-export {
        term 1 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement P3-filter {
        term 1 {
            from {
                as-path P3-local-routes;
                route-filter 0.0.0.0/0 prefix-length-range /32-/32;
            }
            then {
                local-preference 200;
                community set P3;
                accept;
            }
        }
        term 2 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 200;
                community set P3;
                accept;
            }
        }
        term 3 {
            then reject;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54000:64512;
    community C2 members 54000:64513;
    community C3 members 54000:64514;
    community IX members 54000:1620;
    community P1 members 54000:1679;
    community P2 members 54000:64601;
    community P3 members 54000:43208;
    community rtbh members 6451.:666;
    as-path P3-local-routes 2831679853;
} 