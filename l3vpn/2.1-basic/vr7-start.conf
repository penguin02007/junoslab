policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement C1-filter {
        term 1 {
            from {
                community C1-low-pref;
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 90;
                community add C1;
                accept;
            }
        }
        term 2 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 300;
                community add C1;
                accept;
            }
        }
        term 3 {
            then reject;
        }
    }
    policy-statement P1-export {
        term 1 {
            from community IX;
            then reject;
        }
        term 2 {
            from {
                protocol aggregate;
                route-filter 172.16.128.0/17 exact;
            }
            then {
                community set no-export;
                accept;
            }
        }
        term 3 {
            from {
                protocol aggregate;
                route-filter 172.16.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement P1-filter {
        term 1 {
            from {
                as-path P1;
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 200;
                community set P1;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement as-internal {
        term 1 {
            from {
                protocol aggregate;
                route-filter 172.16.0.0/16 exact;
            }
            then {
                metric 20;
                accept;
            }
        }
    }
    policy-statement damp-aggressive {
        term 1 {
            then damping aggressive;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement med-20 {
        term 1 {
            from protocol bgp;
            then {
                metric 20;
                accept;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54000:64512;
    community C1-low-pref members 64512:90;
    community C2 members 54000:64513;
    community C3 members 54000:64514;
    community IX members 54000:1620;
    community P1 members 54000:1679;
    community P2 members 54000:53732;
    community P3 members 54000:43208;
    community no-export members no-export;
    community rtbh members 6451.:666;
    as-path P1 110047427;
    damping aggressive {
        half-life 20;
        reuse 500;
        suppress 2500;
    }
}
