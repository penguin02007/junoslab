groups {
    if-families {
        interfaces {
            ge-0/0/2 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/3 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/4 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            <ae*> {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
        }
    }
}
apply-groups if-families;
system {
    root-authentication {
        encrypted-password "$6$q1KDyFfT$AcOQF3hR758GJOn8KbZgEhRsUvzYhVIKueCdgzH5tG7OquWRdFtemtEFxCNNqOSKJnf4fMZa5hdpL5JQOxzy80"; ## SECRET-DATA
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 1;
        }
    }
}
interfaces {
    ge-0/0/0 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/1 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                active;
            }
        }
        unit 0 {
            description "vR5 to vR6";
            family inet {
                address 172.20.0.3/31;
            }
            family inet6;
        }
    }
}
routing-options {
    aggregate {
        defaults {
            brief;
        }
        route 0.0.0.0/0;
        route 172.20.0.0/16;
    }
    router-id 172.16.0.5;
    autonomous-system 54000;
    forwarding-table {
        export load-balance;
    }
}
protocols {
    rsvp {
        interface ge-0/0/3.145 {
            authentication-key "$9$t8mB01h7Nb2gJevxd"; ## SECRET-DATA
            bandwidth 333m;
            link-protection;
        }
        interface ge-0/0/4.158 {
            authentication-key "$9$9vxIt0ILX-ws4yl87"; ## SECRET-DATA
            bandwidth 333m;
            link-protection;
        }
        interface ae0.0 {
            authentication-key "$9$Okr0IhrVb2aJDWLds"; ## SECRET-DATA
            link-protection;
        }
    }
    mpls {
        statistics {
            file Auto-Bandwidth;
            auto-bandwidth;
        }
        traffic-engineering {
            mpls-forwarding;
        }
        admin-groups {
            green 0;
            red 1;
        }
        ipv6-tunneling;
        no-decrement-ttl;
        label-switched-path vR5-to-vR4 {
            to 172.16.0.4;
            ldp-tunneling;
            priority 6 6;
            admin-group include-any green;
            oam {
                bfd-liveness-detection {
                    minimum-interval 3000;
                }
            }
            link-protection;
            auto-bandwidth {
                adjust-interval 172800;
                minimum-bandwidth 30m;
                maximum-bandwidth 120m;
            }
            primary primary-1;
            secondary secondary-1;
        }
        label-switched-path R5-to-R2 {
            to 172.16.0.2;
            install 192.168.1.0/24;
            bandwidth 60m;
            priority 7 7;
            oam {
                bfd-liveness-detection {
                    minimum-interval 3000;
                }
            }
            adaptive;
            primary primary-2;
            secondary secondary-2;
            secondary secondary-1 {
                standby;
            }
        }
        path primary-1;
        path primary-2;
        path secondary-1;
        path secondary-2;
        interface all;
        interface fxp0.0 {
            disable;
        }
        interface ge-0/0/3.145 {
            admin-group red;
        }
        interface ge-0/0/4.158 {
            admin-group green;
        }
        interface ae0.0 {
            admin-group [ green red ];
        }
    }
    bgp {
        group C3 {
            log-updown;
            damping;
            import [ default-filter C3-filter ];
            family inet {
                unicast;
            }
            family inet6 {
                unicast;
            }
            export as-internal;
            peer-as 64600;
            multipath;
            neighbor 192.168.0.82 {
                export ipv6-next-hop-1;
            }
        }
        group ibgp {
            type internal;
            local-address 172.16.0.5;
            import rtbh;
            family inet {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    explicit-null;
                }
            }
            authentication-key "$9$km5FIRSeK8Ct1h"; ## SECRET-DATA
            export nhs;
            bfd-liveness-detection {
                minimum-interval 3000;
            }
            neighbor 172.16.0.10;
        }
    }
    isis {
        export [ rip-to-isis ospf3-to-isis ];
        reference-bandwidth 10g;
        topologies ipv6-unicast;
        level 2 disable;
        level 1 {
            authentication-key "$9$bEY4ZQz6AtOHqT3"; ## SECRET-DATA
            authentication-type md5;
            wide-metrics-only;
        }
        interface ge-0/0/4.158 {
            ldp-synchronization;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        interface ae0.0 {
            ldp-synchronization;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        interface all {
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
    }
    ospf3 {
        realm ipv4-unicast {
            external-preference 13;
            export [ isis-to-ospf3 rip-to-ospf3 ];
            import ospf3-filter;
            area 0.0.0.0 {
                interface ge-0/0/6.205;
            }
        }
        external-preference 13;
        export isis-to-ospf3;
        import ospf3-filter;
        area 0.0.0.0 {
            interface ge-0/0/6.205;
        }
    }
    ldp {
        track-igp-metric;
        deaggregate;
        explicit-null;
        interface ge-0/0/4.158;
        interface ae0.0;
        interface lo0.0;
        session 172.16.0.6 {
            authentication-key "$9$qPT3REyKvLApIc"; ## SECRET-DATA
        }
        session 172.16.0.8 {
            authentication-key "$9$xI/-b2.mT3nCZUqf"; ## SECRET-DATA
        }
    }
    rip {
        group dc2 {
            preference 14;
            export [ agg-to-rip ospf3-to-rip ];
            import filter-rip;
            neighbor ge-0/0/4.204;
        }
    }
}
policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement C3-filter {
        term 1 {
            from family inet6;
            then accept;
        }
        term 2 {
            from {
                community C3-low-pref;
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 90;
                community add C3;
                accept;
            }
        }
        term 3 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 300;
                community add C3;
                accept;
            }
        }
        term 4 {
            then reject;
        }
    }
    policy-statement agg-to-rip {
        term 1 {
            from {
                protocol aggregate;
                route-filter 0.0.0.0/0 exact;
            }
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement as-internal {
        term 1 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement filter-rip {
        term 1 {
            from {
                protocol rip;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement ipv6-next-hop-1 {
        term 1 {
            from {
                family inet6;
                protocol bgp;
            }
            then {
                next-hop ::192.168.0.9;
            }
        }
    }
    policy-statement ipv6-next-hop-2 {
        term 1 {
            from {
                family inet6;
                protocol bgp;
            }
            then {
                next-hop ::192.168.0.13;
            }
        }
    }
    policy-statement isis-to-ospf3 {
        term 1 {
            from protocol isis;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement load_balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement ospf3-filter {
        term 1 {
            from {
                protocol ospf3;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement ospf3-to-isis {
        term 1 {
            from protocol ospf3;
            then accept;
        }
    }
    policy-statement ospf3-to-rip {
        term 1 {
            from protocol ospf3;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rip-to-isis {
        term 1 {
            from protocol rip;
            then accept;
        }
    }
    policy-statement rip-to-ospf3 {
        term 1 {
            from protocol rip;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54591:64512;
    community C2 members 54591:64513;
    community C3 members 54591:64514;
    community C3-low-pref members 64514:90;
    community IX members 54591:1620;
    community P1 members 54591:1679;
