version 23.2R2.21;
system {
    host-name route-reflector;
    root-authentication {
        encrypted-password "$6$dKAUENJp$kibc4i6XK6t.eEipdWsLxci1KIH0NIzj1M4KIP5wGaQD2NQFn91NBI7Hy/ERukOnzrkV5JFidy8nIEKfcONNM1";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$81cjjJHL$UW85CHXsnNeKcCz/61yJpspbfU38bs/kBSCHE0c07.KVCEujMVWDpR5fQvTbUdkPFOEhtff558iKsa87oJzvy.";
            }
        }
    }
    services {
        ssh;
        extension-service {
            request-response {
                grpc {
                    clear-text {
                        port 57400;
                    }
                    max-connections 4;
                }
            }
        }
        netconf {
            ssh;
            rfc-compliant;
        }
    }
    management-instance;
    static-host-mapping {
        vr1 inet 172.16.0.1;
        vr2 inet 172.16.0.2;
        vr3 inet 172.16.0.3;
        vr4 inet 172.16.0.4;
        vr5 inet 172.16.0.5;
