    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
chassis {
    fpc 0 {
        pic 0 {
            number-of-ports 96;
        }
    }
}
security {
    authentication-key-chains {
        key-chain JNCIE {
            key 0 {
                secret "$9$JDUi.AtOREyQFCuOBEhVws4GD";
                start-time "2026-6-14.06:06:00 +0000";
                algorithm ao;
                ao-attribute {
                    send-id 1;
                    recv-id 1;
                    tcp-ao-option enabled;
                    cryptographic-algorithm aes-128-cmac-96;
                }
            }
        }
    }
}
interfaces {
    ge-0/0/8 {
        flexible-vlan-tagging;
        unit 0 {
            description vR10->vR1;
            vlan-id 4093;
        }
        unit 206 {
            description "vr10 -> vr1";
            vlan-id 206;
            family inet {
                address 172.20.0.65/31;
            }
            family iso;
        }
    }
    ge-0/0/9 {
        flexible-vlan-tagging;
        unit 0 {
            description vR10->vR2;
            vlan-id 4093;
        }
        unit 207 {
            description "vr10 -> vr2";
            vlan-id 207;
            family inet {
                address 172.20.0.67/31;
            }
            family iso;
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 172.16.0.10/32;
            }
            family iso {
                address 49.0001.0000.0000.0010.00;
            }
            family inet6 {
                address fd00:172:16::172:16:0:10/128;
                address fd00:172:16::172:16:1:0/128;
            }
        }
    }
}
routing-instances {
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
        description management-instance;
    }
}
routing-options {
    rib inet6.3 {
        static {
            route 0:0:0:0:0:ffff::/96 receive;
        }
    }
    resolution {
        rib bgp.l3vpn.0 {
            resolution-ribs inet.0;
        }
        rib bgp.l2vpn.0 {
            resolution-ribs inet.0;
        }
    }
    autonomous-system 54000;
}
protocols {
    bgp {
        group cluster-1 {
            type internal;
            local-address 172.16.0.10;
            family inet {
                unicast;
            }
            family inet-vpn {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    explicit-null;
                }
            }
            family l2vpn {
                signaling;
            }
            family evpn {
                signaling;
            }
            authentication-key "$9$WA/XNbiHmTQn4ajq";
            cluster 0.0.0.1;
            bfd-liveness-detection {
                minimum-interval 3000;
            }
            neighbor 172.16.0.1;
            neighbor 172.16.0.6;
            neighbor 172.16.0.7;
            neighbor 172.16.0.8;
        }
        group cluster-2 {
            type internal;
            local-address 172.16.0.10;
            family inet {
                unicast;
            }
            family inet-vpn {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    explicit-null;
                }
            }
            family l2vpn {
                signaling;
            }
            family evpn {
                signaling;
            }
            authentication-key "$9$WA/XNbiHmTQn4ajq";
            cluster 0.0.0.2;
            bfd-liveness-detection {
                minimum-interval 3000;
            }
            neighbor 172.16.0.2;
            neighbor 172.16.0.3;
        }
        disable-4byte-as;
    }
    isis {
        interface all {
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        level 2 disable;
        level 1 {
            authentication-key "$9$lw6v87ZGi.mTwYJD";
            authentication-type md5;
            wide-metrics-only;
        }
    }
    lldp {
        interface fxp0 {
            disable;
        }
        interface all;
    }
}
