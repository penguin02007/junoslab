## Junos Lab ##
version 23.2R2.21;
groups {
    if-families {
        interfaces {
            ge-0/0/2 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/3 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/4 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            <ae0*> {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
        }
    }
}
apply-groups if-families;
system {
    host-name vr5;
    root-authentication {
        encrypted-password "$6$q1KDyFfT$AcOQF3hR758GJOn8KbZgEhRsUvzYhVIKueCdgzH5tG7OquWRdFtemtEFxCNNqOSKJnf4fMZa5hdpL5JQOxzy80";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$mjAWDX8m$yQNTtHXhBlzOqQSwbiIhayXr3wl4VgDAxl4BdwErczvo9jWewrnhFRkypSKEWaZYnj59HOoR5HP2AHrkrrE5f1";
            }
        }
    }
    services {
        ssh;
        extension-service {
            request-response {
                grpc {
                    clear-text {
                        port 57400;
                    }
                    max-connections 4;
                }
            }
        }
        netconf {
            ssh;
            rfc-compliant;
        }
    }
    management-instance;
    static-host-mapping {
        vr1 inet 172.16.0.1;
        vr2 inet 172.16.0.2;
        vr3 inet 172.16.0.3;
        vr4 inet 172.16.0.4;
        vr6 inet 172.16.0.6;
        vr7 inet 172.16.0.7;
        vr8 inet 172.16.0.8;
        vr10 inet 172.16.0.10;
        vdc2 inet 172.16.0.12;
        vdc3 inet 172.16.0.13;
        vix1 inet 172.16.0.21;
        vix2 inet 172.16.0.22;
        vce1-1 inet 172.16.0.111;
        vce1-2 inet 172.16.0.112;
        vce1-3 inet 172.16.0.113;
        vce1-4 inet 172.16.0.114;
        vce2-1 inet 172.16.0.121;
        vce2-2 inet 172.16.0.122;
        vce2-3 inet 172.16.0.123;
        vce2-4 inet 172.16.0.124;
        vce2-5 inet 172.16.0.125;
        vce3-1 inet 172.16.0.131;
        vce3-2 inet 172.16.0.132;
    }
    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 2;
        }
    }
    fpc 0 {
        pic 0 {
            number-of-ports 96;
        }
    }
}
interfaces {
    ge-0/0/0 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/1 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/3 {
        flexible-vlan-tagging;
        unit 145 {
            description "vr5 -> vr4";
            vlan-id 145;
            family inet {
                address 172.20.0.29/31;
            }
            family iso;
        }
    }
    ge-0/0/4 {
        flexible-vlan-tagging;
        unit 158 {
            description "vr5 -> vr8";
            vlan-id 158;
            family inet {
                address 172.20.0.13/31;
            }
        }
    }
    ge-0/0/5 {
        flexible-vlan-tagging;
        unit 0 {
            description vr5->vce2-4;
            vlan-id 4093;
        }
        unit 321 {
            description "vr5 -> vce2-4";
            vlan-id 321;
            family inet {
                address 192.168.0.81/30;
            }
            family iso;
        }
    }
    ge-0/0/6 {
        gigether-options {
            802.3ad ae1;
        }
    }
    ge-0/0/7 {
        flexible-vlan-tagging;
        unit 0 {
            description vr5->vdc3;
            vlan-id 4093;
        }
        unit 205 {
            description "vr5 -> vdc3";
            vlan-id 205;
            family inet {
                address 172.20.0.61/30;
            }
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                active;
            }
        }
        unit 0 {
            description "vR5 to vR6";
            family inet {
                address 172.20.0.3/31;
            }
            family inet6;
            family mpls;
        }
    }
    ae1 {
        flexible-vlan-tagging;
        encapsulation flexible-ethernet-services;
        esi {
            00:00:00:00:00:00:00:00:00:12;
            all-active;
        }
        aggregated-ether-options {
            lacp {
                active;
                system-id 00:00:00:00:00:12;
            }
        }
        unit 202 {
            encapsulation vlan-bridge;
            vlan-id 202;
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
        }
    }
    irb {
        unit 1 {
            family inet {
                address 192.168.2.254/24;
            }
        }
        unit 1000 {
            description "VLAN vdc2_to_vr5 (1000) -> [vdc2]";
            family inet {
                address 172.20.0.57/30;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 172.16.0.5/32;
            }
            family iso {
                address 49.0001.0000.0000.0005.00;
            }
            family inet6 {
                address fd00:172:16::172:16:0:5/128;
            }
        }
    }
}
policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement C3-filter {
        term 1 {
            from family inet6;
            then accept;
        }
        term 2 {
            from {
                community C3-low-pref;
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 90;
                community add C3;
                accept;
            }
        }
        term 3 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                local-preference 300;
                community add C3;
                accept;
            }
        }
        term 4 {
            then reject;
        }
    }
    policy-statement agg-to-rip {
        term 1 {
            from {
                protocol aggregate;
                route-filter 0.0.0.0/0 exact;
            }
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement as-internal {
        term 1 {
            from {
                protocol aggregate;
                route-filter 172.30.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement filter-rip {
        term 1 {
            from {
                protocol rip;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement ipv6-next-hop-1 {
        term 1 {
            from {
                family inet6;
                protocol bgp;
            }
            then {
                next-hop ::192.168.0.9;
            }
        }
    }
    policy-statement ipv6-next-hop-2 {
        term 1 {
            from {
                family inet6;
                protocol bgp;
            }
            then {
                next-hop ::192.168.0.13;
            }
        }
    }
    policy-statement isis-to-ospf3 {
        term 1 {
            from protocol isis;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement load_balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                protocol bgp;
                route-type external;
            }
            then {
                next-hop self;
            }
        }
    }
    policy-statement nhs_ibgp {
        term 1 {
            from protocol bgp;
            then {
                next-hop self;
            }
        }
    }
    policy-statement ospf3-filter {
        term 1 {
            from {
                protocol ospf3;
                tag 123;
            }
            then reject;
        }
    }
    policy-statement ospf3-to-isis {
        term 1 {
            from protocol ospf3;
            then accept;
        }
    }
    policy-statement ospf3-to-rip {
        term 1 {
            from protocol ospf3;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rip-to-isis {
        term 1 {
            from protocol rip;
            then accept;
        }
    }
    policy-statement rip-to-ospf3 {
        term 1 {
            from protocol rip;
            then {
                tag 123;
                accept;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54591:64512;
    community C2 members 54591:64513;
    community C3 members 54591:64514;
    community C3-low-pref members 64514:90;
    community IX members 54591:1620;
    community P1 members 54591:1679;
    community P2 members 54591:53732;
    community P3 members 54591:43208;
    community rtbh members 6451.:666;
}
routing-instances {
    GREEN {
        instance-type vrf;
        protocols {
            bgp {
                group ce {
                    type external;
                    peer-as 64600;
                    neighbor 192.168.0.82;
                }
            }
        }
        interface ge-0/0/5.321;
        route-distinguisher 54001:3;
        vrf-target target:54001:3;
    }
    maroon {
        instance-type mac-vrf;
        protocols {
            evpn;
        }
        bridge-domains {
            bd_maroon {
                vlan-id 202;
                interface ae1.202;
            }
        }
        service-type vlan-aware;
        route-distinguisher 54001:14;
        vrf-target target:54001:6;
    }
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
        description management-instance;
    }
}
routing-options {
    router-id 172.16.0.5;
    autonomous-system 54001;
    aggregate {
        defaults {
            brief;
        }
        route 0.0.0.0/0;
        route 172.20.0.0/16;
    }
    forwarding-table {
        export load-balance;
    }
}
protocols {
    bgp {
        inactive: group C3 {
            log-updown;
            damping;
            import [ default-filter C3-filter ];
            family inet {
                unicast;
            }
            family inet6 {
                unicast;
            }
            export as-internal;
            peer-as 64600;
            multipath;
            neighbor 192.168.0.82 {
                export ipv6-next-hop-1;
            }
        }
        group ibgp {
            type internal;
            local-address 172.16.0.5;
            import rtbh;
            family inet {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    explicit-null;
                }
            }
            family evpn {
                signaling;
            }
            authentication-key "$9$km5FIRSeK8Ct1h";
            export [ nhs nhs_ibgp ];
            bfd-liveness-detection {
                minimum-interval 3000;
            }
            neighbor 172.16.0.4;
            neighbor 172.16.0.6;
        }
    }
    isis {
        interface ge-0/0/3.145 {
            point-to-point;
        }
        inactive: interface ge-0/0/4.158 {
            ldp-synchronization;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        interface ge-0/0/7.205 {
            point-to-point;
        }
        interface ae0.0 {
            point-to-point;
        }
        interface irb.1000 {
            point-to-point;
        }
        interface lo0.0;
        level 2 {
            disable;
            wide-metrics-only;
        }
        level 1 {
            authentication-key "$9$bEY4ZQz6AtOHqT3";
            authentication-type md5;
            wide-metrics-only;
        }
        export [ rip-to-isis ospf3-to-isis ];
        reference-bandwidth 10g;
        topologies ipv6-unicast;
    }
    ldp {
        track-igp-metric;
        deaggregate;
        explicit-null;
        interface ge-0/0/3.145;
        interface ae0.0;
        interface lo0.0;
    }
    mpls {
        statistics {
            file Auto-Bandwidth;
            auto-bandwidth;
        }
        traffic-engineering {
            mpls-forwarding;
        }
        admin-groups {
            green 0;
            red 1;
        }
        no-decrement-ttl;
        label-switched-path vr5-to-vr4 {
            to 172.16.0.4;
            oam {
                bfd-liveness-detection {
                    minimum-interval 3000;
                }
            }
        }
        label-switched-path vr5_to_vr6 {
            to 172.16.0.6;
        }
        path primary-1;
        path primary-2;
        path secondary-1;
        path secondary-2;
        ipv6-tunneling;
        interface all;
        interface fxp0.0 {
            disable;
        }
        interface ge-0/0/3.145 {
            admin-group red;
        }
        interface ge-0/0/4.158 {
            admin-group green;
        }
        interface ae0.0 {
            admin-group [ green red ];
        }
    }
    ospf3 {
        realm ipv4-unicast {
            area 0.0.0.0 {
                interface ge-0/0/6.205;
            }
            external-preference 13;
            export [ isis-to-ospf3 rip-to-ospf3 ];
            import ospf3-filter;
        }
        area 0.0.0.0 {
            interface ge-0/0/6.205;
        }
        external-preference 13;
        export isis-to-ospf3;
        import ospf3-filter;
    }
    rip {
        group dc2 {
            preference 14;
            export [ agg-to-rip ospf3-to-rip ];
            import filter-rip;
            neighbor ge-0/0/4.204;
        }
    }
    rsvp {
        interface ge-0/0/3.145 {
            authentication-key "$9$t8mB01h7Nb2gJevxd";
            bandwidth 333m;
            link-protection;
        }
        interface ae0.0 {
            authentication-key "$9$Okr0IhrVb2aJDWLds";
            link-protection;
        }
    }
    lldp {
        interface fxp0 {
            disable;
        }
        interface all;
    }
}
