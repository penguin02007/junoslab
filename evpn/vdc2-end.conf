## Junos Lab ##
version 23.2R2.21;
system {
    host-name vdc2;
    root-authentication {
        encrypted-password "$6$UuSxfA4/$6qzZdQeLwBIAFC4i5di5cfVG6GkkZQ1uzqCvT6khaCDfc1cl27wldhAkAmb6OnByS8vLbvUjI2fiuZ/.FIOxD1";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$u33Pq9D6$N6a3Zwu86qcxA5qtnSBqXjmuXKNGjJOyipSF.S4W.c28cvIQrBLUnRcM82BT4o4sRnNoLC/Tih1zM.bzHgWZa0";
            }
        }
    }
    services {
        ssh;
        extension-service {
            request-response {
                grpc {
                    clear-text {
                        port 57400;
                    }
                    max-connections 4;
                }
            }
        }
        netconf {
            ssh;
            rfc-compliant;
        }
    }
    management-instance;
    static-host-mapping {
        vr1 inet 172.16.0.1;
        vr2 inet 172.16.0.2;
        vr3 inet 172.16.0.3;
        vr4 inet 172.16.0.4;
        vr5 inet 172.16.0.5;
        vr6 inet 172.16.0.6;
        vr7 inet 172.16.0.7;
        vr8 inet 172.16.0.8;
        vr10 inet 172.16.0.10;
        vdc3 inet 172.16.0.13;
        vix1 inet 172.16.0.21;
        vix2 inet 172.16.0.22;
        vce1-1 inet 172.16.0.111;
        vce1-2 inet 172.16.0.112;
        vce1-3 inet 172.16.0.113;
        vce1-4 inet 172.16.0.114;
        vce2-1 inet 172.16.0.121;
        vce2-2 inet 172.16.0.122;
        vce2-3 inet 172.16.0.123;
        vce2-4 inet 172.16.0.124;
        vce2-5 inet 172.16.0.125;
        vce3-1 inet 172.16.0.131;
        vce3-2 inet 172.16.0.132;
    }
    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 2;
        }
    }
    fpc 0 {
        pic 0 {
            number-of-ports 96;
        }
    }
}
interfaces {
    ge-0/0/1 {
        gigether-options {
            802.3ad ae1;
        }
    }
    ge-0/0/2 {
        gigether-options {
            802.3ad ae1;
        }
    }
    ae1 {
        flexible-vlan-tagging;
        encapsulation flexible-ethernet-services;
        aggregated-ether-options {
            lacp {
                active;
                system-id 00:00:00:00:00:13;
            }
        }
        unit 202 {
            vlan-id 202;
            family inet {
                address 192.168.2.12/24;
            }
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
        }
    }
    irb {
        unit 1001 {
            description "VLAN vdc2_to_vr5 (1001) -> [vr5]";
            family inet {
                address 172.20.0.58/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 172.16.0.12/32;
                address 10.1.1.2/32;
            }
        }
    }
}
routing-instances {
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
        description management-instance;
    }
}
routing-options {
    static {
        route 10.1.1.4/32 next-hop 192.168.2.4;
    }
}
protocols {
    lldp {
        interface fxp0 {
            disable;
        }
        interface all;
    }
}
bridge-domains {
    vlan-1001 {
        domain-type bridge;
        vlan-id 1001;
        interface ge-0/0/2.1001;
        routing-interface irb.1001;
    }
}
