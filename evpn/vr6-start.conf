## Junos Lab ##
version 23.2R2.21;
groups {
    if-families {
        interfaces {
            ge-0/0/2 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/3 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            ge-0/0/4 {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
            <ae*> {
                unit <*> {
                    family iso;
                    family mpls;
                }
            }
        }
    }
}
apply-groups if-families;
system {
    host-name vr6;
    root-authentication {
        encrypted-password "$6$q1KDyFfT$AcOQF3hR758GJOn8KbZgEhRsUvzYhVIKueCdgzH5tG7OquWRdFtemtEFxCNNqOSKJnf4fMZa5hdpL5JQOxzy80";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$uOZfxktj$eWvc6CeXSvUDrEDSXQfARdv985EujasrXtnsBVOl9gWMEu/C3lR7fjonTopFbcRkmmdOH4Jn9mRsTLvDr4bES.";
            }
        }
    }
    services {
        ssh;
        extension-service {
            request-response {
                grpc {
                    clear-text {
                        port 57400;
                    }
                    max-connections 4;
                }
            }
        }
        netconf {
            ssh;
            rfc-compliant;
        }
    }
    management-instance;
    static-host-mapping {
        vr1 inet 172.16.0.1;
        vr2 inet 172.16.0.2;
        vr3 inet 172.16.0.3;
        vr4 inet 172.16.0.4;
        vr5 inet 172.16.0.5;
        vr7 inet 172.16.0.7;
        vr8 inet 172.16.0.8;
        vr10 inet 172.16.0.10;
        vdc2 inet 172.16.0.12;
        vdc3 inet 172.16.0.13;
        vix1 inet 172.16.0.21;
        vix2 inet 172.16.0.22;
        vce1-1 inet 172.16.0.111;
        vce1-2 inet 172.16.0.112;
        vce1-3 inet 172.16.0.113;
        vce1-4 inet 172.16.0.114;
        vce2-1 inet 172.16.0.121;
        vce2-2 inet 172.16.0.122;
        vce2-3 inet 172.16.0.123;
        vce2-4 inet 172.16.0.124;
        vce2-5 inet 172.16.0.125;
        vce3-1 inet 172.16.0.131;
        vce3-2 inet 172.16.0.132;
    }
    syslog {
        file interactive-commands {
            interactive-commands any;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 1;
        }
    }
    fpc 0 {
        pic 0 {
            number-of-ports 96;
        }
    }
}
interfaces {
    ge-0/0/0 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/1 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/3 {
        flexible-vlan-tagging;
        unit 167 {
            description "vr6 -> vr7";
            vlan-id 167;
            family inet {
                address 172.20.0.32/31;
            }
            family iso;
        }
    }
    ge-0/0/4 {
        flexible-vlan-tagging;
        unit 136 {
            description "vr6 -> vr3";
            vlan-id 136;
            family inet {
                address 172.20.0.9/31;
            }
            family iso;
        }
    }
    ge-0/0/5 {
        flexible-vlan-tagging;
        unit 0 {
            description vr6->vce1-4;
            vlan-id 4093;
        }
        unit 322 {
            description "vr6 -> vce1-4";
            vlan-id 322;
            family inet {
                address 192.168.0.85/30;
            }
            family iso;
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                active;
            }
        }
        unit 0 {
            description "vR6 to vR5";
            family inet {
                address 172.20.0.2/31;
            }
            family inet6;
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 172.16.0.6/32;
            }
            family iso {
                address 49.0001.0000.0000.0006.00;
            }
            family inet6 {
                address fd00:172:16::172:16:0:6/128;
            }
        }
    }
}
policy-options {
    prefix-list bgp-peers {
        apply-path "protocols bgp group <*> neighbor <*>";
    }
    policy-statement IX-export {
        term 1 {
            from {
                protocol bgp;
                community P1;
            }
            then reject;
        }
        term 2 {
            from {
                protocol aggregate;
                route-filter 172.16.0.0/16 exact;
            }
            then accept;
        }
    }
    policy-statement IX-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 prefix-length-range /8-/24;
            }
            then {
                community set IX;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement default-filter {
        term 1 {
            from {
                route-filter 0.0.0.0/0 through 0.0.0.0/32;
            }
            then reject;
        }
    }
    policy-statement ldp-routes {
        term 1 {
            from {
                route-filter 192.168.1.0/24 exact;
                route-filter 172.16.0.1/32 exact;
            }
            then accept;
        }
    }
    policy-statement load-balance {
        term 1 {
            then {
                load-balance per-packet;
            }
        }
    }
    policy-statement rtbh {
        term 1 {
            from community rtbh;
            then {
                next-hop discard;
            }
        }
    }
    community C1 members 54000:64512;
    community C2 members 54000:64513;
    community C3 members 54000:64514;
    community IX members 54000:1620;
    community P1 members 54000:1679;
    community P2 members 54000:53732;
    community P3 members 54000:43208;
    community rtbh members 6451.:666;
}
routing-instances {
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
        description management-instance;
    }
}
routing-options {
    router-id 172.16.0.6;
    autonomous-system 54001;
    forwarding-table {
        export load-balance;
    }
}
protocols {
    bgp {
        group IX {
            log-updown;
            import [ default-filter IX-filter ];
            export IX-export;
            peer-as 1620;
            neighbor 192.168.1.3;
            neighbor 192.168.1.4;
        }
        group ibgp {
            type internal;
            local-address 172.16.0.6;
            import rtbh;
            family inet {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    explicit-null;
                }
            }
            authentication-key "$9$WA/XNbiHmTQn4ajq";
            bfd-liveness-detection {
                minimum-interval 3000;
            }
            neighbor 172.16.0.5;
            neighbor 172.16.0.6;
        }
    }
    isis {
        interface ge-0/0/4.136 {
            ldp-synchronization;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        interface ge-0/0/5.322 {
            level 1 {
                passive;
            }
            point-to-point;
        }
        interface ae0.0 {
            ldp-synchronization;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 2000;
                    multiplier 3;
                }
            }
        }
        interface lo0.0;
        level 2 {
            disable;
            wide-metrics-only;
        }
        level 1 {
            authentication-key "$9$lw6v87ZGi.mTwYJD";
            authentication-type md5;
            wide-metrics-only;
        }
        reference-bandwidth 10g;
        topologies ipv6-unicast;
    }
    ldp {
        track-igp-metric;
        egress-policy ldp-routes;
        deaggregate;
        explicit-null;
        interface ae0.0;
        interface lo0.0;
    }
    mpls {
        statistics {
            file Auto-Bandwidth;
            auto-bandwidth;
        }
        traffic-engineering {
            mpls-forwarding;
        }
        admin-groups {
            green 0;
            red 1;
        }
        no-decrement-ttl;
        label-switched-path vR6-to-vR1 {
            to 172.16.0.1;
            install 192.168.1.0/24;
            admin-group include-any green;
            priority 6 6;
            oam {
                bfd-liveness-detection {
                    minimum-interval 3000;
                }
            }
            link-protection;
            auto-bandwidth {
                adjust-interval 172800;
                minimum-bandwidth 30m;
                maximum-bandwidth 120m;
            }
            primary primary-2;
            secondary secondary-2;
        }
        label-switched-path vR6-to-vR3 {
            to 172.16.0.3;
            ldp-tunneling;
            bandwidth 60m;
            priority 7 7;
            oam {
                bfd-liveness-detection {
                    minimum-interval 3000;
                }
            }
            adaptive;
            fast-reroute {
                hop-limit 5;
                no-include-any;
            }
            primary primary-1;
            secondary secondary-1 {
                standby;
            }
        }
        path primary-1;
        path primary-2;
        path secondary-1;
        path secondary-2;
        ipv6-tunneling;
        interface all;
        interface fxp0.0 {
            disable;
        }
        interface ge-0/0/4.136 {
            admin-group green;
        }
        interface ge-0/0/3.167 {
            admin-group red;
        }
        interface ae0.0 {
            admin-group [ green red ];
        }
    }
    rsvp {
        interface ge-0/0/4.136 {
            authentication-key "$9$6g.9CpBW87Vb2cyMX";
            bandwidth 333m;
            link-protection;
        }
        interface ge-0/0/3.167 {
            authentication-key "$9$DsH.50ORSyKn/u1";
            bandwidth 333m;
            link-protection;
        }
        interface ae0.0 {
            authentication-key "$9$-pbYof5F/9pDiPQ";
            link-protection;
        }
    }
    lldp {
        interface fxp0 {
            disable;
        }
        interface all;
    }
}
